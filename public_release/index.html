<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha AI Trading 下载</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --surface: #ffffff;
        --ink: #07111f;
        --muted: #5c6b80;
        --line: #dbe4ee;
        --brand: #155eef;
        --brand-soft: #e6efff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #e9f1ff 0, var(--bg) 50%);
        color: var(--ink);
      }

      .shell {
        max-width: 760px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }

      .hero,
      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: 0 20px 60px rgba(21, 94, 239, 0.08);
      }

      .hero {
        padding: 28px;
        background: linear-gradient(135deg, #07111f, #0d2240);
        color: #fff;
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 12px;
        letter-spacing: 1.8px;
        color: #8cc7ff;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 38px;
        line-height: 1.1;
      }

      .copy {
        margin: 0;
        color: #d0def1;
        line-height: 1.7;
      }

      .panel {
        margin-top: 20px;
        padding: 24px;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }

      .meta-card {
        padding: 16px;
        border-radius: 18px;
        background: #f8fbff;
        border: 1px solid var(--line);
      }

      .meta-label {
        margin: 0 0 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .meta-value {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 20px;
        border-radius: 16px;
        text-decoration: none;
        font-weight: 700;
      }

      .button-primary {
        background: var(--brand);
        color: #fff;
      }

      .button-secondary {
        background: var(--brand-soft);
        color: var(--brand);
      }

      .list {
        margin: 18px 0 0;
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.8;
      }

      .foot {
        margin-top: 18px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">ALPHA AI / RELEASE</p>
        <h1>安卓内测下载</h1>
        <p class="copy">给外部用户下载用的正式入口页。这里放安装包、版本号、校验值和安装说明。</p>
      </section>

      <section class="panel">
        <div class="meta">
          <article class="meta-card">
            <p class="meta-label">当前版本</p>
            <p class="meta-value" id="version">加载中</p>
          </article>
          <article class="meta-card">
            <p class="meta-label">安装包大小</p>
            <p class="meta-value" id="size">加载中</p>
          </article>
          <article class="meta-card">
            <p class="meta-label">发布时间</p>
            <p class="meta-value" id="published">加载中</p>
          </article>
        </div>

        <div class="actions">
          <a class="button button-primary" id="downloadLink" href="alpha-ai-latest.apk">下载最新 APK</a>
          <a class="button button-secondary" href="releases/release.json">查看版本元数据</a>
        </div>

        <ul class="list">
          <li>安卓手机下载安装后，如果提示风险，允许“安装未知应用”即可。</li>
          <li>当前版本默认连接你配置的公网 API 地址，不再依赖局域网电脑。</li>
          <li>给外部用户时，优先发这个下载页，不要再发内网 IP。</li>
        </ul>

        <p class="foot" id="sha">SHA-256: 加载中</p>
      </section>
    </main>

    <script>
      fetch('releases/release.json', { cache: 'no-store' })
        .then((response) => response.json())
        .then((release) => {
          document.getElementById('version').textContent = release.version;
          document.getElementById('size').textContent = `${(release.size_bytes / 1024 / 1024).toFixed(1)} MB`;
          document.getElementById('published').textContent = release.published_at.replace('T', ' ');
          document.getElementById('downloadLink').href = release.apk_path;
          document.getElementById('sha').textContent = `SHA-256: ${release.sha256}`;
        })
        .catch(() => {
          document.getElementById('version').textContent = '未发布';
          document.getElementById('size').textContent = '-';
          document.getElementById('published').textContent = '-';
          document.getElementById('sha').textContent = 'SHA-256: -';
        });
    </script>
  </body>
</html>
