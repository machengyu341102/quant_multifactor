version: "3.9"

services:
  api:
    build: .
    container_name: alpha-ai-api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - PORT=8000
      - WORKERS=2
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  app-data:
    driver: local
  app-logs:
    driver: local
